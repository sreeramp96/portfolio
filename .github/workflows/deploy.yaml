name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Export Laravel → Deploy to Netlify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, curl
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Install NPM dependencies
        run: npm ci

      # FIX: Write .env from scratch — do NOT copy .env.example
      # .env.example has DB_* entries that cause Laravel to crash
      # when there's no database in CI. We only set what we need.
      - name: Create .env
        run: |
          cat > .env << 'EOF'
          APP_NAME="Sreeram P"
          APP_ENV=production
          APP_KEY=
          APP_DEBUG=true
          APP_URL=https://sreeramp96.netlify.app
          ASSET_URL=https://sreeramp96.netlify.app

          LOG_CHANNEL=stderr
          LOG_LEVEL=debug

          # No database — portfolio is config-file driven
          DB_CONNECTION=sqlite
          DB_DATABASE=/dev/null
          EOF

          # Generate a real APP_KEY
          php artisan key:generate --force

      - name: Build frontend assets
        run: npm run build

      # FIX: plain `php artisan export` — no flags
      - name: Export static site
        run: php artisan export

      # Verify dist was actually created and has content
      - name: Verify export output
        run: |
          echo "=== /dist contents ==="
          ls -la dist/
          echo "=== checking index.html exists ==="
          test -f dist/index.html && echo "✅ index.html found" || echo "❌ index.html MISSING"
          echo "=== first 20 lines of index.html ==="
          head -20 dist/index.html

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
